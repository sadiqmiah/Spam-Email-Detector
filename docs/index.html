<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spam Email Detector</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <button id="themeToggle" class="theme-toggle">🌙</button>
    <h1>📧 Spam Email Detector</h1>
    <textarea id="emailText" placeholder="Paste email content here..."></textarea>
    <button onclick="predict()">Detect Spam</button>
    <div id="result"></div>
    <div id="loader" class="loader hidden"></div>
  </div>
  <div class="footer">
  <p style="text-align:center; margin:1rem 0; color:white;">
    How it Works
  </p>
  <p style="text-align:center; margin:0 0 1rem 0; color:white;">
    NLP-based spam email classifier using tokenization, stop-word removal, and a Naive Bayes model, deployed as a full-stack web application with a FastAPI backend and live inference.
  </p>
  <p style="text-align:center; margin:1rem 0 2rem 0; color:white;">
    © 2026 Spam Email Detector. All Rights Reserved
  </p>
</div>
  <script src="app.js"></script>
</body>
</html>
